<div class="mx-auto-0 flex min-h-full w-full max-w-2xl flex-col gap-4 px-4 pb-8 pt-5 sm:px-6">

  <!-- Cabeçalho -->
  <header class="flex items-start justify-between gap-3">
    <div>
      <p class="mt-0.5 text-sm text-slate-500 dark:text-slate-300">
        <span class="inline-flex items-center gap-1.5">
          <span class="relative flex h-2 w-2">
            <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-500"></span>
          </span>
          {{ connectedCount }} Transmitindo
        </span>
      </p>
    </div>

    <button pButton type="button" icon="pi pi-refresh" class="p-button-rounded p-button-text p-button-plain shrink-0"
      [class.animate-spin]="loading" pTooltip="Atualizar" tooltipPosition="left" (click)="onRefresh()"
      aria-label="Atualizar lista de dispositivos"></button>
  </header>

  <!-- Busca -->
  <p-iconfield iconPosition="left" class="w-full">
    <p-inputicon class="pi pi-search" />
    <input pInputText type="text" [(ngModel)]="searchTerm" placeholder="Buscar por nome ou usuário"
      class="w-full !rounded-xl" aria-label="Buscar dispositivo" />
  </p-iconfield>

  <!-- Estado de carregamento -->
  <ng-container *ngIf="loading; else content">
    <div *ngFor="let s of skeletonRows"
      class="flex items-center gap-3 rounded-2xl border border-slate-100 p-4 shadow-sm">
      <p-skeleton shape="circle" size="2.75rem"></p-skeleton>
      <div class="flex-1">
        <p-skeleton width="60%" height="0.9rem" styleClass="mb-2"></p-skeleton>
        <p-skeleton width="40%" height="0.75rem"></p-skeleton>
      </div>
      <p-skeleton width="4.5rem" height="1.5rem" styleClass="!rounded-full"></p-skeleton>
    </div>
  </ng-container>

  <ng-template #content>
    <!-- Lista de dispositivos -->
    <ul *ngIf="filteredDevices.length; else empty" class="flex flex-col gap-3">
      <li *ngFor="let device of filteredDevices; trackBy: trackByDevice"
        class="group flex items-center gap-3 rounded-2xl border border-slate-100 bg-white dark:bg-neutral-900 p-3 shadow-sm transition-shadow active:shadow-none sm:hover:shadow-md">
        <!-- Ícone do dispositivo -->
        <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full text-lg" [ngClass]="{
          'bg-emerald-50 text-emerald-600 dark:bg-emerald-50/10': device.conectado,
          'bg-slate-100 text-slate-400 dark:bg-slate-50/10': !device.conectado,
          }" [style.background]="device.color + '22'" [style.border]="'2px solid ' + device.color">
          @if(!device?.icon) {
          <i [class]="getDeviceIcon(device)"></i>
          }@else{
          <img src="assets/drawable/{{device.icon}}.png" alt="">
          }
        </div>

        <!-- Nome e detalhes -->
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium text-slate-900 dark:text-slate-300 mb-1"
            [pTooltip]=" device?.apelido ?? device.nome" tooltipPosition="top">
            {{ device?.apelido ?? device.nome }}
          </p>
          <p class="truncate text-xs text-slate-500 dark:text-slate-400">
            {{ device.username }}
          </p>
        </div>

        <!-- Status + ações -->
        <div *ngIf="!shareMode" class="flex shrink-0 items-center gap-1">
          <button pButton type="button" class="p-button-rounded p-button-text p-button-plain !h-11 !w-11"
            pTooltip="Ligar" tooltipPosition="top" (click)="chamar(device)">
            <span class="material-symbols-outlined text-[22px]">call</span>
          </button>

          <button pButton type="button" class="p-button-rounded p-button-text p-button-plain !h-11 !w-11"
            pTooltip="Editar apelido" tooltipPosition="top" (click)="editApelido(device)">
            <span class="material-symbols-outlined text-[22px]">edit_square</span>
          </button>

          <app-share-device [device]="device" />
        </div>
      </li>
    </ul>

    <!-- Estado vazio -->
    <ng-template #empty>
      <div
        class="flex flex-col items-center gap-2 rounded-2xl border border-dashed border-slate-200 bg-white/60 dark:bg-neutral-950 py-14 text-center">
        <i class="pi pi-search text-2xl text-slate-300"></i>
        <p class="text-sm font-medium text-slate-700">Nenhum dispositivo encontrado</p>
        <p class="text-xs text-slate-400">Tente buscar por outro nome ou usuário.</p>
      </div>
    </ng-template>
  </ng-template>

</div>


<p-dialog [visible]="!!selected" [modal]="true" [draggable]="false" [resizable]="false" position="bottom"
  [showHeader]="false" styleClass="!m-0 !w-full !max-w-none !rounded-t-3xl sm:!max-w-sm"
  [breakpoints]="{ '640px': '100vw' }">
  <div *ngIf="selected as device" class="flex flex-col gap-4 p-2 my-8">

    <div class="flex gap-3">
      <div class="flex flex-1 flex-col gap-1">
        <label class="text-xs font-bold uppercase text-slate-600">Apelido do dispositivo</label>
        <input pInputText type="text" [(ngModel)]="apelido" placeholder="Ex: Maria"
          class="w-full !rounded-xl !py-2.5" />
      </div>
    </div>
    <!-- Ações -->
    <div class="flex gap-2 pt-3">
      <button pButton type="button" label="Cancelar" icon="pi pi-times" class="p-button-outlined flex-1 !rounded-xl"
        (click)="view = false"></button>
      <button pButton type="button" label="Salvar" icon="pi pi-trash"
        class="p-button-outlined p-button-success flex-1 !rounded-xl" (click)="salvarApelido()"></button>
    </div>
  </div>
</p-dialog>
