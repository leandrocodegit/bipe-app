<div *ngIf="monitoredCard && isVisibleOnRoute && mapReady"
  class="w-full flex items-center justify-between shrink-0 bg-white/95 dark:bg-[#0b1214]/95 backdrop-blur-xl border-b border-slate-200/80 dark:border-white/5 z-40 px-4 py-2.5 transition-transform duration-300 select-none">

  <!-- Left Side: Nickname & Status -->
  <div class="flex items-center gap-2 shrink-0">
    <span class="inline-flex h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
    <span
      class="text-[9px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mr-1 hidden xs:inline">Rastreando</span>
    <h3 class="text-sm font-extrabold tracking-tight text-slate-900 dark:text-white m-0">{{ layoutService.isMobile() ?
      monitoredCard.card.tid : monitoredCard.card?.nickname
      ?? monitoredCard.card.tid }}</h3>
  </div>

  <!-- Middle: Compact Inline Stats -->
  <div class="flex items-center gap-2.5 text-xs">
    <!-- Conexão -->
    <div
      class="flex items-center gap-1.5 bg-slate-100 dark:bg-[#060b0d] px-2.5 py-0.5 rounded-md border border-slate-200/60 dark:border-white/5 text-slate-700 dark:text-slate-300">
      <i *ngIf="layoutService.isDesktop()" class="pi pi-wifi text-[10px] text-slate-400 dark:text-slate-500"></i>
      <span class="font-semibold text-[11px]">{{ connectionText }}</span>
    </div>

    <!-- Bateria -->
    <div
      class="flex items-center gap-1.5 bg-slate-100 dark:bg-[#060b0d] px-2.5 py-0.5 rounded-md border border-slate-200/60 dark:border-white/5 text-slate-700 dark:text-slate-300">
      <span class="material-symbols-outlined text-emerald-500 animate-pulse"
        *ngIf="battery?.isCharging && layoutService.isDesktop()">
        battery_android_frame_bolt
      </span>
      <span class="material-symbols-outlined" *ngIf="!battery?.isCharging && layoutService.isDesktop()">
        battery_android_4
      </span>
      <span class="font-semibold text-[11px]" [class.text-emerald-500]="battery?.isCharging">{{ battery?.percent ?? '—' }}%</span>
    </div>

    <!-- Movimento -->
    <div
      class="flex items-center gap-1.5 bg-slate-100 dark:bg-[#060b0d] px-2.5 py-0.5 rounded-md border border-slate-200/60 dark:border-white/5 text-slate-700 dark:text-slate-300"
      *ngIf="motionLabel">
      <span class="text-[10px]">{{ motionEmoji }}</span>
      <span class="font-semibold text-[11px]">{{ motionLabel }}</span>
    </div>

    <!-- Coordenadas -->
    <div class="hidden sm:flex items-center gap-1.5 text-slate-500 dark:text-slate-400 text-[11px]">
      <i class="pi pi-map-marker text-[10px]"></i>
      <span class="font-medium text-[11px]">{{ locationText }}</span>
    </div>
  </div>

  <!-- Right Side: Action Buttons -->
  <div class="flex items-center gap-1.5 shrink-0">
    <button *ngIf="monitoredCard?.id" (click)="callFriend()"
      class="flex h-8 w-8 items-center justify-center rounded-full bg-blue-100 text-blue-600 transition-colors hover:bg-blue-200 active:scale-95 dark:bg-blue-950/40 dark:text-blue-400"
      pTooltip="Escutar Áudio" tooltipPosition="top">
      <i class="pi pi-phone text-sm"></i>
    </button>
    <button (click)="centerOnCard()" title="Centralizar no Mapa"
      class="flex h-8 w-8 items-center justify-center rounded-full bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-500 dark:text-cyan-400 transition-colors shadow-sm">
      <i class="pi pi-bullseye text-xs"></i>
    </button>
    <button (click)="clearMonitor()" title="Parar Monitoramento"
      class="flex h-8 w-8 items-center justify-center rounded-full bg-orange-500/10 hover:bg-orange-500/20 text-orange-600 dark:text-orange-400 transition-colors shadow-sm">
      <i class="pi pi-times text-xs"></i>
    </button>
  </div>
</div>
