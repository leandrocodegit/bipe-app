<div *ngIf="monitoredCard && isVisibleOnRoute" 
     class="w-full lg:w-96 flex flex-col shrink-0 bg-white dark:bg-neutral-900 border-t lg:border-t-0 lg:border-l border-slate-200 dark:border-neutral-800 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.1)] lg:shadow-none rounded-t-3xl lg:rounded-none z-40 overflow-y-auto max-h-[60vh] lg:max-h-full p-5 pb-8 lg:pb-5 transition-transform duration-300">
  
  <!-- Indicador de "puxar" visual apenas para Mobile (Pill Handle) -->
  <div class="mx-auto -mt-2 mb-4 h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700 sm:hidden"></div>

  <!-- Cabeçalho -->
  <div class="flex items-start justify-between gap-3">
    <div class="space-y-0.5">
      <div class="flex items-center gap-2">
        <span class="inline-flex h-2 w-2 animate-pulse rounded-full bg-emerald-500"></span>
        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Monitorando</span>
      </div>
      <h3 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">{{ monitoredCard.card.tid }}</h3>
      <p class="text-xs font-medium text-slate-500 dark:text-slate-400">{{ monitoredCard.card.name }}</p>
    </div>
    
    <!-- Botão Fechar Modernizado -->
    <button (click)="clearMonitor()" 
            class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-100 text-slate-500 transition-colors hover:bg-slate-200 active:scale-95 dark:bg-slate-900 dark:text-slate-400 dark:hover:bg-slate-800">
      <i class="pi pi-times text-xs"></i>
    </button>
  </div>

  <!-- Grid de Status Dinâmico (Estilo Dashboard Mobile) -->
  <div class="mt-5 grid grid-cols-2 gap-2.5">
    
    <!-- Conexão -->
    <div class="flex flex-col rounded-xl bg-slate-50 p-3 dark:bg-slate-900/50">
      <span class="text-[11px] font-medium text-slate-400 dark:text-slate-500">Conexão</span>
      <span class="mt-1 text-sm font-semibold text-slate-800 dark:text-slate-200 truncate">{{ connectionText }}</span>
    </div>

    <!-- Bateria -->
    <div class="flex flex-col rounded-xl bg-slate-50 p-3 dark:bg-slate-900/50">
      <span class="text-[11px] font-medium text-slate-400 dark:text-slate-500">Bateria</span>
      <div class="mt-1 flex items-center gap-1.5">
        <span class="text-sm font-semibold text-slate-800 dark:text-slate-200">{{ battery?.percent ?? '—' }}%</span>
        <i *ngIf="battery?.isCharging" class="pi pi-bolt text-xs text-emerald-500 animate-bounce"></i>
      </div>
    </div>

    <!-- Movimento -->
    <div class="col-span-2 flex items-center justify-between rounded-xl bg-slate-50 p-3 dark:bg-slate-900/50">
      <div class="flex flex-col">
        <span class="text-[11px] font-medium text-slate-400 dark:text-slate-500">Estado de Movimento</span>
        <span *ngIf="motionLabel; else noMotion" class="mt-0.5 text-sm font-semibold text-slate-800 dark:text-slate-200">
          {{ motionEmoji }} {{ motionLabel }}
        </span>
        <ng-template #noMotion>
          <span class="mt-0.5 text-sm font-medium text-slate-400 dark:text-slate-600">Desconhecido</span>
        </ng-template>
      </div>
    </div>
  </div>

  <!-- Linha de Posição (Texto Longo) -->
  <div class="mt-3 flex items-start gap-2 px-1 text-xs text-slate-500 dark:text-slate-400">
    <i class="pi pi-map-marker mt-0.5 text-slate-400"></i>
    <span class="leading-relaxed">{{ locationText }}</span>
  </div>

  <!-- Ações Inferiores (Botões Grandes e Fáceis de Clicar no Mobile) -->
  <div class="mt-5 flex gap-3">
    <button pButton type="button" 
            label="Centralizar" 
            icon="pi pi-sliders-h"
            class="p-button-raised flex-1 !py-3 !rounded-xl !text-sm !bg-indigo-600 !border-indigo-600 hover:!bg-indigo-700 font-semibold" 
            (click)="centerOnCard()">
    </button>
    <button pButton type="button" 
            label="Parar" 
            class="p-button-text flex-1 !py-3 !rounded-xl !text-sm text-slate-600 dark:text-slate-400 font-medium" 
            (click)="clearMonitor()">
    </button>
  </div>
</div>
