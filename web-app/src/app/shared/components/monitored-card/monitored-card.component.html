<div *ngIf="monitoredCard" class="fixed right-4 top-20 z-[1100] w-80 max-w-[calc(100vw-1rem)] rounded-3xl border border-slate-200 bg-white p-4 shadow-2xl shadow-slate-500/10 dark:border-slate-800 dark:bg-slate-950 dark:shadow-slate-950/50">
  <div class="flex items-start justify-between gap-3">
    <div>
      <span class="text-[10px] uppercase tracking-[0.3em] text-slate-400 dark:text-slate-500">Monitorando</span>
      <p class="mt-1 text-lg font-semibold text-slate-900 dark:text-white">{{ monitoredCard.card.tid }}</p>
      <p class="text-xs text-slate-500 dark:text-slate-400">{{ monitoredCard.card.name }}</p>
    </div>
    <button pButton type="button" icon="pi pi-times" class="p-button-text p-button-rounded" aria-label="Parar monitoramento" (click)="clearMonitor()"></button>
  </div>

  <div class="mt-4 space-y-3 text-sm text-slate-700 dark:text-slate-300">
    <div>
      <span class="font-semibold">Bateria:</span>
      <span>{{ battery?.percent ?? '—' }}%</span>
      <span *ngIf="battery?.isCharging" class="text-emerald-500">(carregando)</span>
    </div>

    <div>
      <span class="font-semibold">Conexão:</span>
      <span>{{ connectionText }}</span>
    </div>

    <div>
      <span class="font-semibold">Posição:</span>
      <span>{{ locationText }}</span>
    </div>

    <div *ngIf="motionLabel; else noMotion">
      <span class="font-semibold">Movimento:</span>
      <span>{{ motionEmoji }} {{ motionLabel }}</span>
    </div>
    <ng-template #noMotion>
      <span class="text-slate-400">Movimento desconhecido</span>
    </ng-template>
  </div>

  <div class="mt-4 flex gap-2">
    <button pButton type="button" label="Centralizar" class="p-button-sm p-button-outlined flex-1" (click)="centerOnCard()"></button>
    <button pButton type="button" label="Cancelar" class="p-button-sm p-button-text flex-1" (click)="clearMonitor()"></button>
  </div>
</div>
