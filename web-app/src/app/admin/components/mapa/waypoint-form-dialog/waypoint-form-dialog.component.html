<p-dialog header="Nova Região de Controle" [(visible)]="visible" [modal]="true" [draggable]="false" [resizable]="false"
  (onHide)="fechar()"
  styleClass="region-dialog !m-0 !h-[100dvh] !max-h-[100dvh] !w-screen !max-w-none !rounded-none sm:!m-4 sm:!h-auto sm:!max-h-[85vh] sm:!w-full sm:!max-w-lg sm:!rounded-2xl">
  <div class="flex flex-col gap-5 pb-2 pt-1">
    <p class="text-xs text-slate-500">
      Defina os parâmetros da cerca virtual para a coordenada:
      <br />
      <span class="font-mono text-indigo-500">{{ latLng?.lat | number:'1.5-5' }}, {{ latLng?.lng | number:'1.5-5'
        }}</span>
    </p>

    <!-- Nome e Raio -->
    <div class="flex gap-3">
      <div class="flex flex-1 flex-col gap-1">
        <label class="text-xs font-bold uppercase text-slate-600">Nome da Região</label>
        <input pInputText type="text" [(ngModel)]="formulario.desc" placeholder="Ex: Matriz"
          class="w-full !rounded-xl !py-2.5" />
      </div>
      <div class="flex w-28 flex-col gap-1">
        <label class="text-xs font-bold uppercase text-slate-600">Raio (m)</label>
        <p-inputNumber [(ngModel)]="formulario.rad" [min]="1" suffix=" m" styleClass="w-full !rounded-xl"
          inputStyleClass="!py-2.5" class="w-full"></p-inputNumber>
      </div>
    </div>

    <!-- Dispositivos (MultiSelect) -->
    <div class="overflow-hidden rounded-xl border border-slate-200">
      <p-table [value]="filteredDevicesTable" [scrollable]="true" scrollHeight="280px" styleClass="device-picker-table">
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 44px">
              <p-checkbox [binary]="true" [ngModel]="allFilteredSelected" (onChange)="toggleSelectAll()"></p-checkbox>
            </th>
            <th>Dispositivo</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-device>
          <tr class="cursor-pointer transition-colors active:bg-slate-50"
            [class.bg-indigo-50]="isDeviceSelected(device)" (click)="toggleDevice(device)">
            <td>
              <p-checkbox [binary]="true" [ngModel]="isDeviceSelected(device)" (click)="$event.stopPropagation()"
                (onChange)="toggleDevice(device)"></p-checkbox>
            </td>
            <td>
              <div class="flex items-center gap-2.5">
                <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full text-lg" [ngClass]="{
          'bg-emerald-50 text-emerald-600 dark:bg-emerald-50/10': device.conectado,
          'bg-slate-100 text-slate-400 dark:bg-slate-50/10': !device.conectado,
          }" [style.background]="device.color + '22'" [style.border]="'2px solid ' + device.color">
                  @if(!device?.icon) {
                  <i [class]="getDeviceIcon(device)"></i>
                  }@else{
                  <img src="assets/drawable/{{device.icon}}.png" alt="">
                  }
                </div>
                <div class="flex min-w-0 flex-col">
                  <span class="truncate text-sm font-semibold text-slate-700">{{ device.nome }}</span>
                  <span class="text-[10px] uppercase tracking-wider text-slate-400">{{ device.os || 'Desconhecido'
                    }}</span>
                </div>
              </div>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="3" class="py-8 text-center text-sm text-slate-400">Nenhum dispositivo encontrado</td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex w-full gap-2 pt-2">
      <button pButton label="Cancelar" icon="pi pi-times"
        class="p-button-text p-button-secondary flex-1 !rounded-xl !py-3" (click)="fechar()"></button>
      <button pButton label="Adicionar Região" icon="pi pi-check" class="p-button-success flex-1 !rounded-xl !py-3"
        [disabled]="!formulario.desc || formulario.deviceIds.length === 0" (click)="confirmar()"></button>
    </div>
  </ng-template>
</p-dialog>
