<div class="flex flex-col w-full overflow-hidden relative" [style.height]="height">
  <app-monitored-card />


  <div class="z-[1001]">
    <p-speeddial [model]="speedDialItems" showIcon="pi pi-users" hideIcon="pi pi-times" [radius]="120" [style]="{ position: 'absolute', left: '15px', bottom: '15px' }" classStyle="bg-color">

      <ng-template let-friend pTemplate="item">

        <button type="button" (click)="friend.onClick()"
          class="friend-bubble relative flex h-[55px] w-[55px] items-center justify-center rounded-full text-3xl shadow-sm transition-transform active:scale-90 sm:hover:-translate-y-0.5 sm:hover:shadow-md"
          [class.friend-bubble--new]="true" [style.background]="friend?.color ? friend.color + 'd0' : '#3862b2d0'"
          [style.border]="'2px solid ' + (friend?.color ? friend.color + 'd0' : '#3862b2d0')">

          @if(friend?.image){
          <img src="assets/drawable/{{friend?.image}}.png" alt="">
          }@else {
          <p class="text-white text-lg align-middle">{{friend.tid}}</p>
          }

        </button>
      </ng-template>
    </p-speeddial>

  </div>


  <div class="flex-1 w-full min-h-0 relative">
    <div id="map" #mapContainer class="w-full h-full z-30" [class.bg-transicoes]="ultimasTransicoes.length"></div>
    <div class="mqtt-message-indicator" [class.active]="mqttMessageActive" title="Recebendo mensagens MQTT"></div>
  </div>
